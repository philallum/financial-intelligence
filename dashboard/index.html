<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Intelligence Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1419; color: #e7e9ea; padding: 2rem; max-width: 1400px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; color: #e7e9ea; font-weight: 500; }
    .subtitle { font-size: 0.8rem; color: #8b98a5; margin-bottom: 1.5rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-full { grid-column: 1 / -1; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    .card { background: #1a1f25; border: 1px solid #2f3336; border-radius: 12px; padding: 1.5rem; }
    .card h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8b98a5; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .card h2 .dot { width: 6px; height: 6px; border-radius: 50%; background: #00c853; }
    .card h2 .dot.error { background: #ff1744; }
    .asset { font-size: 1.8rem; font-weight: 600; margin-bottom: 0.5rem; }
    .direction { display: flex; gap: 1.5rem; margin: 1rem 0; }
    .dir-item { text-align: center; }
    .dir-item .label { font-size: 0.7rem; color: #8b98a5; margin-bottom: 0.25rem; }
    .dir-item .value { font-size: 1.6rem; font-weight: 600; }
    .dir-item.up .value { color: #00c853; }
    .dir-item.down .value { color: #ff1744; }
    .dir-item.flat .value { color: #ffab00; }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.75rem; margin-top: 1rem; }
    .metric { padding: 0.6rem; background: #0f1419; border-radius: 8px; }
    .metric .label { font-size: 0.65rem; color: #8b98a5; text-transform: uppercase; letter-spacing: 0.03em; }
    .metric .value { font-size: 1rem; font-weight: 500; margin-top: 0.2rem; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
    .badge-go { background: #00c85320; color: #00c853; }
    .badge-conditional { background: #ffab0020; color: #ffab00; }
    .badge-no_go { background: #ff174420; color: #ff1744; }
    .badge-success { background: #00c85320; color: #00c853; }
    .badge-error { background: #ff174420; color: #ff1744; }
    .valid-until { font-size: 0.75rem; color: #8b98a5; margin-top: 0.75rem; }
    .stale-alert { background: #ff174420; border: 1px solid #ff1744; border-radius: 8px; padding: 0.6rem 1rem; margin-top: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .stale-alert .icon { font-size: 1rem; }
    .stale-alert .text { font-size: 0.75rem; color: #ff1744; font-weight: 500; }
    .stale-alert .subtext { font-size: 0.7rem; color: #ff8a80; margin-top: 0.2rem; }
    .error { color: #ff1744; }
    #loading { color: #8b98a5; }
    .config { margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .config input { background: #1a1f25; border: 1px solid #2f3336; border-radius: 6px; padding: 0.5rem 0.75rem; color: #e7e9ea; font-size: 0.8rem; width: 280px; }
    .config button { background: #1d9bf0; color: white; border: none; border-radius: 6px; padding: 0.5rem 1rem; cursor: pointer; font-size: 0.8rem; }
    .config button:hover { background: #1a8cd8; }
    .config .sep { color: #2f3336; }

    /* Similarity table */
    .sim-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    .sim-table th { text-align: left; color: #8b98a5; font-weight: 500; padding: 0.4rem 0.6rem; border-bottom: 1px solid #2f3336; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.03em; }
    .sim-table td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #1a1f25; }
    .sim-table tr:hover td { background: #0f1419; }
    .score-bar { height: 4px; border-radius: 2px; background: #2f3336; position: relative; width: 60px; display: inline-block; vertical-align: middle; }
    .score-bar-fill { height: 100%; border-radius: 2px; background: #1d9bf0; }
    .layer-scores { display: flex; gap: 0.3rem; }
    .layer-dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }

    /* Trace timeline */
    .trace-timeline { display: flex; flex-direction: column; gap: 0.4rem; }
    .trace-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.4rem 0.6rem; background: #0f1419; border-radius: 6px; font-size: 0.75rem; }
    .trace-item .name { width: 120px; font-weight: 500; }
    .trace-item .version { color: #8b98a5; width: 50px; }
    .trace-item .duration-bar { flex: 1; height: 6px; background: #2f3336; border-radius: 3px; position: relative; }
    .trace-item .duration-fill { height: 100%; border-radius: 3px; background: #1d9bf0; }
    .trace-item .duration-label { width: 55px; text-align: right; color: #8b98a5; font-size: 0.7rem; }
    .trace-item .status-dot { width: 6px; height: 6px; border-radius: 50%; }
    .trace-item .status-dot.success { background: #00c853; }
    .trace-item .status-dot.error { background: #ff1744; }

    /* Regime card */
    .regime-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .regime-tag { padding: 0.3rem 0.7rem; background: #0f1419; border: 1px solid #2f3336; border-radius: 6px; font-size: 0.75rem; }
    .regime-tag.active { border-color: #1d9bf0; color: #1d9bf0; }

    /* Research archive history */
    .history-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .history-header { display: flex; justify-content: space-between; padding: 0 0.6rem 0.3rem; border-bottom: 1px solid #2f3336; margin-bottom: 0.3rem; }
    .history-header span { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.03em; color: #8b98a5; }
    .hdr-pred { flex: 1; }
    .hdr-out { width: 170px; text-align: right; }
    .history-item { display: flex; align-items: center; gap: 1rem; padding: 0.5rem 0.6rem; background: #0f1419; border-radius: 6px; font-size: 0.75rem; }
    .history-item .time { width: 130px; color: #8b98a5; }
    .history-item .dir { display: flex; gap: 0.4rem; }
    .history-item .dir span { padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.7rem; font-weight: 600; }
    .history-item .move { width: 70px; text-align: right; }
    .history-item .conf { width: 50px; text-align: right; color: #8b98a5; }
    .history-item-extended { display: flex; align-items: center; padding: 0.5rem 0.6rem; background: #0f1419; border-radius: 6px; font-size: 0.75rem; }
    .history-item-extended .prediction-col { display: flex; align-items: center; gap: 0.75rem; flex: 1; }
    .history-item-extended .prediction-col .time { width: 110px; color: #8b98a5; }
    .history-item-extended .prediction-col .dir span { padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.7rem; font-weight: 600; }
    .history-item-extended .prediction-col .move { width: 65px; text-align: right; }
    .history-item-extended .prediction-col .conf { width: 45px; text-align: right; color: #8b98a5; }
    .history-item-extended .outcome-col { width: 170px; display: flex; align-items: center; gap: 0.5rem; justify-content: flex-end; }
    .outcome-badge { padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.7rem; font-weight: 600; }
    .outcome-error { font-size: 0.65rem; color: #8b98a5; }
    .outcome-pending { font-size: 0.65rem; color: #556270; font-style: italic; }
  </style>
</head>
<body>
  <h1>Financial Intelligence Platform</h1>
  <div class="subtitle">Deterministic Financial Research · EUR/USD · Next 4 Hours</div>

  <div class="config">
    <input id="api-url" type="text" placeholder="API URL" value="https://financial-intelligence-api-517029156879.europe-west1.run.app">
    <span class="sep">|</span>
    <input id="supabase-url" type="text" placeholder="Supabase URL" value="https://vzfamclwlbxonabvhcve.supabase.co">
    <button onclick="refreshAll()">Refresh All</button>
  </div>

  <div class="grid" id="content">
    <p id="loading">Loading...</p>
  </div>

  <script>
    // Supabase anon key (publishable, safe to expose in client code — RLS enforced)
    const SUPABASE_ANON_KEY = 'sb_publishable_LpljDfNLU5cmIjFB2mu-gg_Ve5S6zkL';

    async function supabaseQuery(table, params = '') {
      const baseUrl = document.getElementById('supabase-url').value.replace(/\/$/, '');
      const url = `${baseUrl}/rest/v1/${table}?${params}`;
      const res = await fetch(url, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        }
      });
      return res.json();
    }

    async function refreshAll() {
      const content = document.getElementById('content');
      content.innerHTML = '<p id="loading" class="grid-full">Loading...</p>';

      try {
        const [forecast, researchForecasts, similarity, traces, recentCandles] = await Promise.all([
          fetchForecastData(),
          supabaseQuery('research_forecasts', 'select=id,fingerprint_id,asset,confidence_final,sample_size,created_at,direction_probabilities,expected_move_pips,regime,engine_versions,forecast_expiry&order=created_at.desc&limit=10'),
          supabaseQuery('research_similarity_archive', 'select=match_fingerprint_id,similarity_score,rank,layer_breakdown,match_explanation&order=rank.asc&limit=10'),
          supabaseQuery('execution_traces', 'select=engine_name,engine_version,status,execution_time_ms,timestamp_utc&order=timestamp_utc.desc&limit=12'),
          supabaseQuery('raw_candles', 'select=timestamp_utc,close&asset=eq.EURUSD&timeframe=eq.4H&order=timestamp_utc.desc&limit=20'),
        ]);

        let html = '';

        // 1. Current Forecast Card
        html += renderForecastCard(forecast);

        // 2. Regime & Pipeline State
        html += renderRegimeCard(researchForecasts[0], traces);

        // 3. Pipeline Execution Traces
        html += renderTracesCard(traces);

        // 4. Top Similarity Matches
        html += renderSimilarityCard(similarity);

        // 5. Research Archive History (with actual outcomes from candles)
        html += renderHistoryCard(researchForecasts, recentCandles);

        content.innerHTML = html;
      } catch (err) {
        content.innerHTML = `<div class="card grid-full"><p class="error">Failed to load: ${err.message}</p></div>`;
      }
    }

    async function fetchForecastData() {
      const baseUrl = document.getElementById('api-url').value.replace(/\/$/, '');
      const res = await fetch(`${baseUrl}/v1/forecast/EURUSD`);
      if (!res.ok) throw new Error('API returned ' + res.status);
      return res.json();
    }

    function renderForecastCard(data) {
      const dp = data.direction_probabilities;
      const label = data.tradeability_label || 'NO_GO';
      const badgeClass = `badge-${label.toLowerCase()}`;
      const badgeText = label === 'GO' ? 'Good to Trade' : label === 'CONDITIONAL' ? 'Trade with Caution' : "Don't Trade Now";
      const dominant = dp.up >= dp.down && dp.up >= dp.flat ? 'UP' : dp.down >= dp.flat ? 'DOWN' : 'FLAT';
      const dominantText = dominant === 'UP' ? 'Price Goes Up' : dominant === 'DOWN' ? 'Price Goes Down' : 'Price Stays Flat';

      return `
        <div class="card">
          <h2><span class="dot"></span>Current Prediction</h2>
          <div class="asset">EUR/USD <span style="font-size:0.8rem;color:#8b98a5;font-weight:400">· Next 4 Hours</span></div>
          <div class="direction">
            <div class="dir-item up">
              <div class="label">Price Goes Up</div>
              <div class="value">${(dp.up * 100).toFixed(0)}%</div>
            </div>
            <div class="dir-item down">
              <div class="label">Price Goes Down</div>
              <div class="value">${(dp.down * 100).toFixed(0)}%</div>
            </div>
            <div class="dir-item flat">
              <div class="label">Price Stays Flat</div>
              <div class="value">${(dp.flat * 100).toFixed(0)}%</div>
            </div>
          </div>
          <div class="metrics">
            <div class="metric">
              <div class="label">Predicted Price Change</div>
              <div class="value">${data.expected_move_pips > 0 ? '+' : ''}${data.expected_move_pips} points</div>
            </div>
            <div class="metric">
              <div class="label">How Sure We Are</div>
              <div class="value">${(data.confidence_final * 100).toFixed(1)}%</div>
            </div>
            <div class="metric">
              <div class="label">Should You Act?</div>
              <div class="value"><span class="badge ${badgeClass}">${badgeText}</span></div>
            </div>
            <div class="metric">
              <div class="label">Most Likely Direction</div>
              <div class="value">${dominantText}</div>
            </div>
          </div>
          <div class="valid-until">Prediction expires: ${new Date(data.forecast_valid_until).toLocaleString()} &middot; Trading Cost: ${data.execution_metrics?.spread_penalty || '\u2014'} &middot; Market Hours: ${data.execution_metrics?.session_alignment || '\u2014'}</div>
          ${renderStalenessAlert(data.forecast_valid_until)}
        </div>
      `;
    }

    function renderStalenessAlert(forecastValidUntil) {
      if (!forecastValidUntil) return '';
      const expiresAt = new Date(forecastValidUntil);
      const now = new Date();
      if (now <= expiresAt) return '';

      const overdueMs = now.getTime() - expiresAt.getTime();
      const overdueMin = Math.floor(overdueMs / 60000);
      const overdueHrs = Math.floor(overdueMin / 60);
      const overdueText = overdueHrs > 0
        ? `${overdueHrs}h ${overdueMin % 60}m overdue`
        : `${overdueMin}m overdue`;

      return `
        <div class="stale-alert">
          <span class="icon">\u26A0\uFE0F</span>
          <div>
            <div class="text">Prediction is stale &mdash; batch pipeline may have missed a run (${overdueText})</div>
            <div class="subtext">Expected refresh at ${expiresAt.toLocaleTimeString()}. Check Cloud Scheduler logs for fip-batch-trigger jobs.</div>
          </div>
        </div>
      `;
    }

    function renderRegimeCard(latestResearch, traces) {
      if (!latestResearch) return '<div class="card"><h2>Current Market Conditions & System Health</h2><p style="color:#8b98a5;font-size:0.8rem">No research data yet</p></div>';

      const regime = latestResearch.regime || {};
      const ev = latestResearch.engine_versions || {};
      const successCount = traces.filter(t => t.status === 'success').length;
      const errorCount = traces.filter(t => t.status === 'error').length;
      const totalMs = traces.filter(t => t.status === 'success').reduce((sum, t) => sum + t.execution_time_ms, 0);

      const volLabel = (regime.volatility_regime || '—').toLowerCase();
      const volText = volLabel === 'low' ? 'Calm Market' : volLabel === 'high' ? 'Volatile Market' : 'Normal Market';
      const trendLabel = (regime.trend_regime || '—').toLowerCase();
      const trendText = trendLabel === 'bullish' ? 'Prices Rising' : trendLabel === 'bearish' ? 'Prices Falling' : 'Prices Ranging';
      const sessionLabel = (regime.session || '—').toLowerCase();
      const sessionText = sessionLabel === 'london' ? 'London Trading Hours' : sessionLabel === 'ny' ? 'New York Trading Hours' : sessionLabel === 'asia' ? 'Asia Trading Hours' : regime.session || '—';

      return `
        <div class="card">
          <h2><span class="dot ${errorCount > 0 ? 'error' : ''}"></span>Current Market Conditions & System Health</h2>
          <div class="regime-tags">
            <div class="regime-tag active">${volText}</div>
            <div class="regime-tag active">${trendText}</div>
            <div class="regime-tag active">${sessionText}</div>
          </div>
          <div class="metrics" style="margin-top:1rem">
            <div class="metric">
              <div class="label">Data Points Used</div>
              <div class="value">${latestResearch.sample_size}</div>
            </div>
            <div class="metric">
              <div class="label">System Steps Completed</div>
              <div class="value">${successCount} of ${successCount + errorCount} succeeded</div>
            </div>
            <div class="metric">
              <div class="label">Processing Time</div>
              <div class="value">${totalMs}ms</div>
            </div>
            <div class="metric">
              <div class="label">Pattern Matcher Version</div>
              <div class="value">v${ev.fingerprint || '—'}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderTracesCard(traces) {
      // Only show the most recent successful batch traces
      const recentSuccess = traces.filter(t => t.status === 'success').slice(0, 11);
      if (recentSuccess.length === 0) return '<div class="card grid-full"><h2>System Processing Steps</h2><p style="color:#8b98a5;font-size:0.8rem">No traces yet</p></div>';

      const maxMs = Math.max(...recentSuccess.map(t => t.execution_time_ms), 1);

      const engineNameMap = {
        'confidence-engine': 'Confidence Calculator',
        'confidence-engine-v2': 'Confidence Calculator v2',
        'regime-engine': 'Market Conditions',
        'regime-engine-v2': 'Market Conditions v2',
        'fingerprint-engine': 'Pattern Matcher',
        'similarity-engine': 'Similar Situations Finder',
        'forecast-engine': 'Prediction Generator',
        'topology-engine': 'Market Structure',
        'tradeability-engine': 'Trade Readiness',
        'outcome-engine': 'Outcome Tracker',
      };

      const items = recentSuccess.reverse().map(t => {
        const friendlyName = engineNameMap[t.engine_name] || t.engine_name;
        return `
          <div class="trace-item">
            <div class="status-dot ${t.status}"></div>
            <div class="name">${friendlyName}</div>
            <div class="version">v${t.engine_version}</div>
            <div class="duration-bar"><div class="duration-fill" style="width:${(t.execution_time_ms / maxMs * 100).toFixed(0)}%"></div></div>
            <div class="duration-label">${t.execution_time_ms}ms</div>
          </div>
        `;
      }).join('');

      return `
        <div class="card grid-full">
          <h2>System Processing Steps</h2>
          <div class="trace-timeline">${items}</div>
        </div>
      `;
    }

    function renderSimilarityCard(matches) {
      if (!matches || matches.length === 0) return '<div class="card grid-full"><h2>Most Similar Past Situations</h2><p style="color:#8b98a5;font-size:0.8rem">No matches yet</p></div>';

      const rows = matches.map(m => {
        const lb = m.layer_breakdown;
        const score = (m.similarity_score * 100).toFixed(2);
        const layers = ['market_structure', 'volatility', 'liquidity', 'macro', 'sentiment'];
        const layerNames = ['Structure', 'Volatility', 'Liquidity', 'Economy', 'Sentiment'];
        const layerBars = layers.map((l, i) => {
          const v = lb[l] || 0;
          const color = v > 0.9 ? '#00c853' : v > 0.7 ? '#ffab00' : '#ff1744';
          return `<span title="${layerNames[i]}: ${(v*100).toFixed(1)}%" style="display:inline-block;width:24px;height:8px;background:#2f3336;border-radius:2px;position:relative;overflow:hidden"><span style="position:absolute;left:0;top:0;height:100%;width:${(v*100).toFixed(0)}%;background:${color};border-radius:2px"></span></span>`;
        }).join('');

        const reason = m.match_explanation?.primary_match_reason || '—';
        const matched = (m.match_explanation?.matched_layers || []).join(', ') || '—';

        return `
          <tr>
            <td style="color:#8b98a5">#${m.rank}</td>
            <td style="font-family:monospace;font-size:0.65rem;color:#8b98a5">${m.match_fingerprint_id.slice(0, 12)}…</td>
            <td><strong>${score}%</strong></td>
            <td>${layerBars}</td>
            <td style="color:#8b98a5;font-size:0.7rem">${matched}</td>
          </tr>
        `;
      }).join('');

      return `
        <div class="card grid-full">
          <h2>Most Similar Past Situations <span style="font-size:0.7rem;color:#8b98a5;text-transform:none;letter-spacing:0;font-weight:400">(${matches.length} of 50 shown)</span></h2>
          <table class="sim-table">
            <thead>
              <tr><th>Rank</th><th>Pattern ID</th><th>How Similar (%)</th><th>Structure · Volatility · Liquidity · Economy · Sentiment</th><th>What Matched</th></tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    function renderHistoryCard(forecasts, candles) {
      if (!forecasts || forecasts.length === 0) return '<div class="card"><h2>Prediction History</h2><p style="color:#8b98a5;font-size:0.8rem">No archived predictions yet</p></div>';

      // Build candle lookup: timestamp → close price
      const candleMap = new Map();
      if (candles && Array.isArray(candles)) {
        for (const c of candles) {
          // Normalize to ISO string for matching
          candleMap.set(new Date(c.timestamp_utc).toISOString(), c.close);
        }
      }

      // Snap a date to the nearest 4H grid boundary (floor)
      function snapToGrid(date) {
        const d = new Date(date);
        const hour = Math.floor(d.getUTCHours() / 4) * 4;
        d.setUTCHours(hour, 0, 0, 0);
        return d.toISOString();
      }

      const PIP_SIZE = 0.0001;
      let correctCount = 0;
      let evaluatedCount = 0;

      const items = forecasts.map(f => {
        const dp = f.direction_probabilities;
        const dominant = dp.up >= dp.down && dp.up >= dp.flat ? 'UP' : dp.down >= dp.flat ? 'DOWN' : 'FLAT';
        const dominantText = dominant === 'UP' ? 'Price Up' : dominant === 'DOWN' ? 'Price Down' : 'Flat';
        const color = dominant === 'UP' ? '#00c853' : dominant === 'DOWN' ? '#ff1744' : '#ffab00';
        const time = new Date(f.created_at).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

        let outcomeHtml = '';

        // The forecast is made at a candle boundary, predicting the move over the next 4H.
        // forecast_expiry = boundary + 4H = the timestamp of the "result" candle.
        // Actual move = close at forecast_expiry - close at (forecast_expiry - 4H)
        // Snap times to 4H grid since forecasts may be created slightly after the boundary.
        const expiry = f.forecast_expiry ? new Date(f.forecast_expiry) : null;
        const expirySnapped = expiry ? snapToGrid(expiry) : null;
        const boundarySnapped = expiry ? snapToGrid(new Date(expiry.getTime() - 4 * 60 * 60 * 1000)) : null;

        const closeAtBoundary = boundarySnapped ? candleMap.get(boundarySnapped) : undefined;
        const closeAtExpiry = expirySnapped ? candleMap.get(expirySnapped) : undefined;

        if (closeAtBoundary !== undefined && closeAtExpiry !== undefined) {
          const actualPips = (closeAtExpiry - closeAtBoundary) / PIP_SIZE;
          const actualDir = actualPips > 0.5 ? 'Up' : actualPips < -0.5 ? 'Down' : 'Flat';
          const actualColor = actualPips > 0.5 ? '#00c853' : actualPips < -0.5 ? '#ff1744' : '#ffab00';
          const predictedDir = dominant;
          const actualDirNorm = actualPips > 0.5 ? 'UP' : actualPips < -0.5 ? 'DOWN' : 'FLAT';
          const correct = predictedDir === actualDirNorm;

          evaluatedCount++;
          if (correct) correctCount++;

          const resultIcon = correct ? '\u2705' : '\u274C';

          outcomeHtml = `
            <div class="outcome-col">
              <span style="background:${actualColor}20;color:${actualColor};padding:0.1rem 0.4rem;border-radius:3px;font-size:0.7rem;font-weight:600">${actualDir}</span>
              <span style="font-size:0.75rem;min-width:55px;text-align:right">${actualPips > 0 ? '+' : ''}${actualPips.toFixed(1)} pts</span>
              <span style="font-size:0.75rem">${resultIcon}</span>
            </div>
          `;
        } else {
          const isExpired = expiry && expiry < new Date();
          outcomeHtml = `
            <div class="outcome-col">
              <span class="outcome-pending">${isExpired ? 'Awaiting candle' : 'Pending'}</span>
            </div>
          `;
        }

        return `
          <div class="history-item-extended">
            <div class="prediction-col">
              <div class="time">${time}</div>
              <div class="dir"><span style="background:${color}20;color:${color}">${dominantText} ${(Math.max(dp.up, dp.down, dp.flat) * 100).toFixed(0)}%</span></div>
              <div class="move">${f.expected_move_pips > 0 ? '+' : ''}${f.expected_move_pips} pts</div>
              <div class="conf">${(f.confidence_final * 100).toFixed(1)}%</div>
            </div>
            ${outcomeHtml}
          </div>
        `;
      }).join('');

      const accuracy = evaluatedCount > 0 ? ((correctCount / evaluatedCount) * 100).toFixed(0) : '--';
      const statsHtml = evaluatedCount > 0
        ? `<span style="font-size:0.7rem;color:#8b98a5;text-transform:none;letter-spacing:0;font-weight:400">(${forecasts.length} recent &middot; ${accuracy}% direction accuracy on ${evaluatedCount} evaluated)</span>`
        : `<span style="font-size:0.7rem;color:#8b98a5;text-transform:none;letter-spacing:0;font-weight:400">(${forecasts.length} recent)</span>`;

      return `
        <div class="card">
          <h2>Prediction History ${statsHtml}</h2>
          <div class="history-header">
            <span class="hdr-pred">Prediction</span>
            <span class="hdr-out">Actual Outcome</span>
          </div>
          <div class="history-list">${items}</div>
        </div>
      `;
    }

    // Initial load
    refreshAll();

    // Auto-refresh every 60 seconds
    setInterval(refreshAll, 60000);
  </script>
</body>
</html>
