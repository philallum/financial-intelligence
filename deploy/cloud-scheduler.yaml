  # -------------------------------------------------------------------------
  # Weekly Drift Check — ML Service
  # -------------------------------------------------------------------------
  # Triggers drift detection and conditional auto-retraining on the ML service.
  # If drift is detected in any regime, the endpoint will invoke /train internally.
  # Retries with exponential backoff (30s–120s) to handle transient unavailability.
  #
  # Requirements: 7.1, 7.2, 7.3
  # -------------------------------------------------------------------------

  - name: fip-ml-drift-check-weekly
    description: "Weekly drift check + conditional retraining (Sundays 02:00 UTC)"
    schedule: "0 2 * * 0"
    timeZone: "UTC"
    httpTarget:
      uri: "https://fip-ml-HASH-REGION.a.run.app/drift-check"
      httpMethod: POST
      headers:
        Content-Type: "application/json"
      body: '{}'
      oidcToken:
        serviceAccountEmail: "fip-scheduler@PROJECT_ID.iam.gserviceaccount.com"
    retryConfig:
      retryCount: 3
      maxRetryDuration: "300s"
      minBackoffDuration: "30s"
      maxBackoffDuration: "120s"
    attemptDeadline: "600s"
