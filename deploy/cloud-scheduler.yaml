# =============================================================================
# Cloud Scheduler Configuration — Batch Pipeline & ML Service Triggers
# =============================================================================
# Defines 7 cron jobs:
#   - 6 batch pipeline triggers every 4 hours (00:02–20:02 UTC)
#   - 1 weekly drift check on the ML service (Sundays 02:00 UTC)
#
# Batch triggers fire at 2 minutes past the hour (60-180s buffer after candle close).
# Target: Cloud Run batch service (fip-batch) via authenticated HTTP POST
#
# Weekly drift check triggers drift detection + conditional auto-retraining.
# Target: Cloud Run ML service (fip-ml) via authenticated HTTP POST
#
# Deploy with the companion script: deploy/setup-scheduler.sh
#
# Requirements: 7.1, 7.2, 7.3, 12.2, 14.1
# =============================================================================

# Configuration for all 7 Cloud Scheduler jobs

schedulerJobs:
  - name: fip-batch-trigger-0002
    description: "Trigger batch pipeline at 00:02 UTC (after 00:00 candle close)"
    schedule: "2 0 * * *"
    timeZone: "UTC"
    httpTarget:
      uri: "https://fip-batch-HASH-REGION.a.run.app"
      httpMethod: POST
      headers:
        Content-Type: "application/json"
      body: '{"trigger":"scheduled","candle_boundary":"00:00"}'
      oidcToken:
        serviceAccountEmail: "fip-scheduler@PROJECT_ID.iam.gserviceaccount.com"
    retryConfig:
      retryCount: 1
      maxRetryDuration: "60s"
    attemptDeadline: "900s"

