# =============================================================================
# Cloud Build Configuration
# =============================================================================
# Builds and deploys both services (batch pipeline + API) to Cloud Run.
#
# Infrastructure:
#   Registry: europe-west1-docker.pkg.dev/$PROJECT_ID/financial-intelligence
#   Batch: Cloud Run Job "financial-intelligence-batch" (europe-west1)
#   API: Cloud Run Service "financial-intelligence-api" (europe-west1)
#
# Usage:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --project=financial-intelligence-501107
#
# Requirements: 12.1, 12.2, 12.6, 12.7, 16.2, 16.4
# =============================================================================

substitutions:
  _REGION: 'europe-west1'
  _REGISTRY: 'europe-west1-docker.pkg.dev'
  _REPOSITORY: 'financial-intelligence'
  _TAG: 'latest'

steps:
  # --- Step 0a: Install Node.js dependencies ---
  - name: 'node:22-alpine'
    entrypoint: 'npm'
    args: ['ci']
    id: 'install-deps'

  # --- Step 0b: Run tests ---
  - name: 'node:22-alpine'
    entrypoint: 'npx'
    args: ['vitest', '--run']
    waitFor: ['install-deps']
    id: 'run-tests'

  # --- Step 0c: Build TypeScript and generate OpenAPI spec ---
  - name: 'node:22-alpine'
    entrypoint: 'npm'
    args: ['run', 'build']
    waitFor: ['install-deps']
    id: 'build-ts'

  # --- Step 1: Build batch pipeline image ---
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.batch'
      - '-t'
      - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/batch:${_TAG}'
      - '-t'
      - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/batch:latest'
      - '.'
    waitFor: ['run-tests', 'build-ts']
    id: 'build-batch'

  # --- Step 2: Build API service image ---
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.api'
      - '-t'
      - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/api:${_TAG}'
      - '-t'
      - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/api:latest'
      - '.'
    waitFor: ['run-tests', 'build-ts']
    id: 'build-api'

  # --- Step 3: Build integrity job image ---
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.integrity'
      - '-t'
      - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/integrity:${_TAG}'
      - '-t'
      - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/integrity:latest'
      - '.'
    waitFor: ['run-tests', 'build-ts']
    id: 'build-integrity'

  # --- Step 3b: Build ML service image ---
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.ml'
      - '-t'
      - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/ml:${_TAG}'
      - '-t'
      - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/ml:latest'
      - '.'
    waitFor: ['install-deps']
    id: 'build-ml'

  # --- Step 4: Push batch image ---
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/batch:${_TAG}']
    waitFor: ['build-batch']
    id: 'push-batch'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/batch:latest']
    waitFor: ['build-batch']
    id: 'push-batch-latest'

  # --- Step 5: Push API image ---
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/api:${_TAG}']
    waitFor: ['build-api']
    id: 'push-api'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/api:latest']
    waitFor: ['build-api']
    id: 'push-api-latest'

  # --- Step 6: Push integrity image ---
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/integrity:${_TAG}']
    waitFor: ['build-integrity']
    id: 'push-integrity'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/integrity:latest']
    waitFor: ['build-integrity']
    id: 'push-integrity-latest'

  # --- Step 6b: Push ML image ---
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/ml:${_TAG}']
    waitFor: ['build-ml']
    id: 'push-ml'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/ml:latest']
    waitFor: ['build-ml']
    id: 'push-ml-latest'

  # --- Step 7: Deploy batch Cloud Run Job ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'update'
      - 'financial-intelligence-batch'
      - '--image=${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/batch:${_TAG}'
      - '--region=${_REGION}'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--task-timeout=900s'
      - '--max-retries=1'
      - '--parallelism=1'
      - '--tasks=1'
    waitFor: ['push-batch', 'push-batch-latest']
    id: 'deploy-batch'

  # --- Step 8: Deploy API Cloud Run Service ---
  # Deploys with max 2 instances (cost ceiling) and mounts RAPIDAPI_PROXY_SECRET
  # from Secret Manager for RapidAPI marketplace proxy validation.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'financial-intelligence-api'
      - '--image=${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/api:${_TAG}'
      - '--region=${_REGION}'
      - '--max-instances=2'
      - '--update-secrets=RAPIDAPI_PROXY_SECRET=rapidapi-proxy-secret:latest'
    waitFor: ['push-api', 'push-api-latest']
    id: 'deploy-api'

  # --- Step 9: Deploy integrity Cloud Run Job ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'fip-integrity'
      - '--image=${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/integrity:${_TAG}'
      - '--region=${_REGION}'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--task-timeout=1800s'
      - '--max-retries=0'
      - '--parallelism=1'
      - '--tasks=1'
      - '--set-env-vars=NODE_ENV=production,GCP_PROJECT_ID=$PROJECT_ID,GCP_LOCATION=us-central1,GEMINI_MODEL=gemini-2.5-flash'
      - '--update-secrets=SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,TWELVE_DATA_API_KEY=TWELVE_DATA_API_KEY:latest,MASSIVE_API_KEY=MASSIVE_API_KEY:latest,ALPHA_VANTAGE_API_KEY=ALPHA_VANTAGE_API_KEY:latest,FINNHUB_API_KEY=FINNHUB_API_KEY:latest,NEWS_API_KEY=NEWS_API_KEY:latest'
    waitFor: ['push-integrity', 'push-integrity-latest']
    id: 'deploy-integrity'

  # --- Step 10: Deploy ML Cloud Run Service ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'fip-ml'
      - '--image=${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/ml:${_TAG}'
      - '--region=${_REGION}'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--max-instances=1'
      - '--min-instances=0'
      - '--port=5000'
      - '--no-allow-unauthenticated'
      - '--update-secrets=SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest'
    waitFor: ['push-ml', 'push-ml-latest']
    id: 'deploy-ml'



images:
  - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/batch:${_TAG}'
  - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/batch:latest'
  - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/api:${_TAG}'
  - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/api:latest'
  - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/integrity:${_TAG}'
  - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/integrity:latest'
  - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/ml:${_TAG}'
  - '${_REGISTRY}/$PROJECT_ID/${_REPOSITORY}/ml:latest'

options:
  logging: CLOUD_LOGGING_ONLY
