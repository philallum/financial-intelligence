# =============================================================================
# Cloud Build Configuration
# =============================================================================
# Builds and deploys both services (batch pipeline + API) to Cloud Run.
#
# Substitution variables (set in Cloud Build trigger or CLI):
#   _REGION: GCP region (default: europe-west2)
#   _PROJECT_ID: GCP project ID (auto-set by Cloud Build)
#
# Usage:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_REGION=europe-west2
#
# Requirements: 12.1, 12.2, 12.6, 12.7
# =============================================================================

substitutions:
  _REGION: 'europe-west2'

steps:
  # --- Step 1: Build batch pipeline image ---
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.batch'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/fip-batch:${SHORT_SHA}'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/fip-batch:latest'
      - '.'
    id: 'build-batch'

  # --- Step 2: Build API service image ---
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.api'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/fip-api:${SHORT_SHA}'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/fip-api:latest'
      - '.'
    id: 'build-api'

  # --- Step 3: Push batch image ---
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/fip-batch:${SHORT_SHA}']
    waitFor: ['build-batch']
    id: 'push-batch'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/fip-batch:latest']
    waitFor: ['build-batch']
    id: 'push-batch-latest'

  # --- Step 4: Push API image ---
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/fip-api:${SHORT_SHA}']
    waitFor: ['build-api']
    id: 'push-api'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/fip-api:latest']
    waitFor: ['build-api']
    id: 'push-api-latest'

  # --- Step 5: Deploy batch service to Cloud Run ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'fip-batch'
      - '--image=gcr.io/${PROJECT_ID}/fip-batch:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--max-instances=1'
      - '--min-instances=0'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=900'
      - '--concurrency=1'
      - '--no-cpu-throttling'
      - '--set-env-vars=NODE_ENV=production'
    waitFor: ['push-batch', 'push-batch-latest']
    id: 'deploy-batch'

  # --- Step 6: Deploy API service to Cloud Run ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'fip-api'
      - '--image=gcr.io/${PROJECT_ID}/fip-api:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--max-instances=2'
      - '--min-instances=0'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--timeout=60'
      - '--concurrency=80'
      - '--set-env-vars=NODE_ENV=production'
    waitFor: ['push-api', 'push-api-latest']
    id: 'deploy-api'

images:
  - 'gcr.io/${PROJECT_ID}/fip-batch:${SHORT_SHA}'
  - 'gcr.io/${PROJECT_ID}/fip-batch:latest'
  - 'gcr.io/${PROJECT_ID}/fip-api:${SHORT_SHA}'
  - 'gcr.io/${PROJECT_ID}/fip-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
